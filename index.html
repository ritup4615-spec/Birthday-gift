<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rudrakshi 🎂</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

.container {
    position: relative;
    top: 15vh;
    padding: 20px;
}

h1 {
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

#typing-text {
    font-size: 1.3rem;
    color: white;
    margin: 20px auto;
    width: 90%;
    min-height: 40px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
}

button {
    padding: 12px 25px;
    font-size: 1rem;
    border: none;
    border-radius: 30px;
    background-color: #ff4081;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #e91e63;
    transform: scale(1.05);
}

/* Cake */
.cake {
    position: relative;
    margin: 30px auto;
    width: 200px;
    animation: float 3s ease-in-out infinite;
}

.layer {
    height: 50px;
    background: #ff85a1;
    border-radius: 10px;
    margin: 5px 0;
}

.icing {
    height: 20px;
    background: white;
    border-radius: 10px;
    margin-top: -10px;
}

.candle {
    width: 10px;
    height: 40px;
    background: #00bbf9;
    margin: 0 auto;
    position: relative;
}

.flame {
    width: 15px;
    height: 15px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    left: -2.5px;
    animation: flicker 0.3s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(1.2); opacity: 0.7; }
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Confetti */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

@media (max-width: 600px) {
    h1 { font-size: 1.8rem; }
    #typing-text { font-size: 1rem; }
    .cake { width: 150px; }
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎉 Happy Birthday Rudrakshi 🎂</h1>

    <div id="typing-text"></div>

    <div class="cake">
        <div class="candle">
            <div class="flame"></div>
        </div>
        <div class="icing"></div>
        <div class="layer"></div>
        <div class="icing"></div>
        <div class="layer"></div>
    </div>

    <button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script>
/* Typing Animation */
const message = "Dear Rudrakshi, may your life be filled with happiness, success, love and endless smiles! 💖✨";
let index = 0;

function typeEffect() {
    if (index < message.length) {
        document.getElementById("typing-text").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeEffect, 60);
    }
}
window.onload = typeEffect;

/* Confetti */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function randomColor() {
    const colors = ["#ff0a54", "#ff477e", "#00bbf9", "#00f5d4", "#ffd60a"];
    return colors[Math.floor(Math.random() * colors.length)];
}

function createConfetti() {
    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 8 + 2,
            speed: Math.random() * 3 + 2,
            color: randomColor()
        });
    }
}

function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confetti.forEach((c, index) => {
        ctx.fillStyle = c.color;
        ctx.fillRect(c.x, c.y, c.size, c.size);
        c.y += c.speed;

        if (c.y > canvas.height) {
            confetti.splice(index, 1);
        }
    });
}

function animate() {
    drawConfetti();
    requestAnimationFrame(animate);
}

function startConfetti() {
    createConfetti();
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
